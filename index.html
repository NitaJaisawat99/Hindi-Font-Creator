<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hindi Font Creator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amita:wght@400;700&family=Arya:wght@400;700&family=Gotu&family=Kalam:wght@300;400;700&family=Kurale&family=Modak&family=Rozha+One&family=Sura:wght@400;700&family=Tillana:wght@400;500;600;700;800&family=Yatra+One&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-gradient: linear-gradient(135deg, #8e2de2, #4a00e0);
            --text-color: #ffffff;
            --accent-color: #bb86fc;
            --delete-color: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* कीबोर्ड फिक्स के लिए */
        }

        header {
            background: var(--surface-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-btns button {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* स्क्रॉलिंग सक्षम */
            padding-bottom: 60px;
        }

        .canvas-container-wrapper {
            width: 100%;
            height: 350px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .tools-panel {
            padding: 15px;
            background: var(--surface-color);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            flex: 1;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        textarea {
            flex: 1;
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            height: 50px;
        }

        .btn-action {
            border: none;
            color: white;
            border-radius: 12px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
        }

        #addBtn { background: var(--primary-gradient); }
        #deleteBtn { background: var(--delete-color); display: none; }

        .font-selector {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .font-item {
            background: #2c2c2c;
            padding: 10px 20px;
            border-radius: 12px;
            white-space: nowrap;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .font-item.active { border-color: var(--accent-color); background: rgba(187, 134, 252, 0.1); }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .control-item {
            background: #2c2c2c;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .opacity-control { grid-column: span 2; }

        .control-item label { font-size: 0.8rem; color: #aaa; }
        
        .upload-btn {
            background: #333;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            display: block;
            border: 1px dashed var(--accent-color);
        }

        input[type="file"] { display: none; }

        .ad-banner {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #000;
            color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Hindi Font Creator</h1>
        <div class="header-btns">
            <button onclick="shareImage()">Share</button>
            <button onclick="saveImage()">Save</button>
        </div>
    </header>

    <main>
        <div class="canvas-container-wrapper" id="canvasWrapper">
            <canvas id="editorCanvas"></canvas>
        </div>

        <div class="tools-panel">
            <div class="input-group">
                <textarea id="textInput" placeholder="यहाँ हिंदी में टाइप करें..."></textarea>
                <button id="addBtn" class="btn-action" onclick="addText()">Add</button>
                <button id="deleteBtn" class="btn-action" onclick="deleteObject()">Delete</button>
            </div>

            <div class="font-selector" id="fontSelector"></div>

            <div class="controls-grid">
                <div class="control-item">
                    <label>Text Color</label>
                    <input type="color" id="textColor" value="#ffffff" oninput="updateTextProperty('fill', this.value)">
                </div>
                <div class="control-item">
                    <label>Bg Color</label>
                    <input type="color" id="canvasBgColor" value="#000000" oninput="changeCanvasColor(this.value)">
                </div>
                <div class="control-item opacity-control">
                    <label>Opacity</label>
                    <input type="range" id="textOpacity" min="0.1" max="1" step="0.1" value="1" oninput="updateTextProperty('opacity', parseFloat(this.value))">
                </div>
            </div>

            <label class="upload-btn">
                📸 Upload Background Image
                <input type="file" id="bgUploader" accept="image/*" onchange="loadBackgroundImage(event)">
            </label>
        </div>
    </main>

    <div class="ad-banner">AdMob: ca-app-pub-1887729646043203/9924065088</div>

    <script>
        const canvasWrapper = document.getElementById('canvasWrapper');
        const canvas = new fabric.Canvas('editorCanvas', {
            width: canvasWrapper.clientWidth,
            height: 350,
            backgroundColor: '#000000',
            preserveObjectStacking: true
        });

        // Fonts
        const hindiFonts = ['Yatra One', 'Kalam', 'Amita', 'Arya', 'Gotu', 'Kurale', 'Modak', 'Rozha One', 'Sura', 'Tillana'];
        const fontSelector = document.getElementById('fontSelector');
        
        hindiFonts.forEach((font, index) => {
            let div = document.createElement('div');
            div.className = 'font-item' + (index === 0 ? ' active' : '');
            div.style.fontFamily = font;
            div.innerText = 'हिंदी टेक्स्ट';
            div.onclick = () => {
                document.querySelectorAll('.font-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                updateTextProperty('fontFamily', font);
            };
            fontSelector.appendChild(div);
        });

        // Selection Logic for Delete Button
        canvas.on('selection:created', showDelete);
        canvas.on('selection:updated', showDelete);
        canvas.on('selection:cleared', hideDelete);

        function showDelete() {
            document.getElementById('addBtn').style.display = 'none';
            document.getElementById('deleteBtn').style.display = 'block';
        }

        function hideDelete() {
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('deleteBtn').style.display = 'none';
        }

        function addText() {
            const textVal = document.getElementById('textInput').value;
            if (!textVal) return;
            const activeFont = document.querySelector('.font-item.active').style.fontFamily;
            const text = new fabric.IText(textVal, {
                left: canvas.width / 2,
                top: canvas.height / 2,
                fontFamily: activeFont,
                fill: document.getElementById('textColor').value,
                fontSize: 40,
                originX: 'center',
                originY: 'center',
                cornerColor: '#bb86fc',
                cornerStyle: 'circle'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            document.getElementById('textInput').value = '';
            document.activeElement.blur(); // कीबोर्ड छुपाएं
        }

        function deleteObject() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                canvas.remove(activeObj);
                canvas.discardActiveObject();
                hideDelete();
            }
        }

        function updateTextProperty(prop, val) {
            const obj = canvas.getActiveObject();
            if (obj) {
                obj.set(prop, val);
                canvas.renderAll();
            }
        }

        function changeCanvasColor(color) {
            canvas.backgroundImage = null;
            canvas.backgroundColor = color;
            canvas.renderAll();
        }

        function loadBackgroundImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                    img.set({ originX: 'center', originY: 'center', left: canvas.width / 2, top: canvas.height / 2, scaleX: scale, scaleY: scale });
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                });
            };
            reader.readAsDataURL(file);
        }

        // --- FIXED SAVE FUNCTION ---
        function saveImage() {
            canvas.discardActiveObject();
            canvas.renderAll();
            
            // मोबाइल के लिए सुरक्षित डाउनलोड तरीका
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0,
                multiplier: 2 // हाई क्वालिटी के लिए
            });

            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'HindiCreator_' + Date.now() + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function shareImage() {
            canvas.discardActiveObject();
            canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
            const blob = await (await fetch(dataURL)).blob();
            const file = new File([blob], 'hindi_art.png', { type: 'image/png' });
            if (navigator.share) {
                navigator.share({ files: [file] });
            } else {
                alert("Browser doesn't support sharing. Please use Save.");
            }
        }
    </script>
</body>
</html>
